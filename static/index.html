<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>别名邮箱管理系统</title><link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ 登录页 ============ -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="logo">A</div>
      <h1>别名邮箱管理系统</h1>
      <p>多邮箱别名 · 邮件查询 · Webhook 推送</p>
    </div>
    <div id="loginError" class="login-error"></div>
    <div class="login-tabs">
      <button id="tabLogin" class="active" onclick="switchLoginTab('login')">登录</button>
      <button id="tabRegister" onclick="switchLoginTab('register')">注册</button>
    </div>
    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="doLogin(event); return false;">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" id="loginUsername" class="form-control" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-block">登录</button>
    </form>
    <!-- 注册表单 -->
    <form id="registerForm" class="hidden" onsubmit="doRegister(event); return false;">
      <div class="form-group">
        <label class="form-label">用户名 <span class="req">*</span></label>
        <input type="text" id="regUsername" class="form-control" placeholder="至少 3 个字符" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码 <span class="req">*</span></label>
        <input type="password" id="regPassword" class="form-control" placeholder="至少 6 个字符" required>
      </div>
      <button type="submit" class="btn btn-block">注册</button>
    </form>
  </div>
</div>

<!-- ============ 主应用 ============ -->
<div id="appView" class="app hidden">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-logo">
        <span class="mark">A</span>
        <span>别名邮箱管理</span>
      </div>
      <nav class="app-nav" id="appNav"></nav>
      <div class="app-user">
        <div class="meta">
          <div class="name" id="navUsername"></div>
          <div class="role" id="navRole"></div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="doLogout()">登出</button>
      </div>
    </div>
  </header>
  <main class="app-main" id="appMain"></main>
</div>

<div id="toastBox"></div>
<div id="modalRoot"></div>
<script src="js/app.js"></script>
</body>
</html>
