name = "mail-alias"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# Workers 静态资源(前端界面)
# run_worker_first = true: 所有请求先经过 Worker,由 Worker 调用 ASSETS 并设置缓存头
# 这样能确保 HTML 不被 CDN 边缘缓存,用户总能加载最新前端代码
[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = true

# D1 数据库(用户/邮箱账号/Webhook/日志)
[[d1_databases]]
binding = "DB"
database_name = "mail_alias"
database_id = "f7b79fd7-055d-4ab7-9151-7f3cbe153a49"

# KV(会话/OAuth state 缓存)
[[kv_namespaces]]
binding = "KV"
id = "351359d5a2614b28b273465a29bdfd2d"

# 变量(可在 wrangler secret 中覆盖,或在此明文填入测试值)
[vars]
# OAuth 应用凭据 - 实际部署请用 `wrangler secret put` 写入
# GOOGLE_CLIENT_ID = "xxx"
# GOOGLE_CLIENT_SECRET = "xxx"
# 微软: 默认走 Thunderbird 公共客户端(consumers 端点,无需 client_secret),无需配置即可授权 Outlook/Hotmail
# 如需改用自注册 Azure 应用,可设置 MS_CLIENT_ID 覆盖默认值
# MS_CLIENT_ID = "xxx"
# MS_CLIENT_SECRET = "xxx"   # 已废弃: 公共客户端不再使用 client_secret,保留仅为兼容旧部署
# JWT_SECRET = "随机长字符串"
# ENCRYPT_KEY = "32字节hex,用于加密refresh_token"
# BASE_URL = "https://your-worker.workers.dev"

# 默认管理员(首次部署时初始化用,部署后请立即在「我的账户」修改密码)
# 请将下方密码改为自己的强密码,切勿使用示例值
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "请修改为你的强密码"

# Cron Trigger: 每分钟自动轮询所有有活跃 webhook 的邮箱账号
# 拉取新邮件并推送到订阅的回调 URL (飞书/钉钉/自定义)
[triggers]
crons = ["* * * * *"]
