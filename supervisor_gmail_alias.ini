[program:gmail_alias]
command=/opt/gmail_alias/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/opt/gmail_alias
user=www-data
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/var/log/gmail_alias/out.log
stderr_logfile=/var/log/gmail_alias/err.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=5
environment=ADMIN_TOKEN="admin123_",PYTHONUNBUFFERED="1"
