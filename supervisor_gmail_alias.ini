; ============================================
; Gmail Alias Email API - Supervisor 配置文件
; ============================================
; 部署路径: /data/gmail_alias
; 日志路径: /data/gmail_alias/logs/gmail_alias.log
; --------------------------------------------
; 部署步骤:
;   1. 上传项目到 /data/gmail_alias
;   2. cd /data/gmail_alias && python3 -m venv venv
;   3. /data/gmail_alias/venv/bin/pip install -r requirements.txt
;   4. mkdir -p /data/gmail_alias/logs /data/gmail_alias/data
;   5. sudo cp supervisor_gmail_alias.ini /etc/supervisor/conf.d/
;   6. sudo supervisorctl reread && sudo supervisorctl update
;   7. sudo supervisorctl status gmail_alias
; --------------------------------------------

[program:gmail_alias]
command=/data/gmail_alias/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/data/gmail_alias
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/data/gmail_alias/logs/gmail_alias.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
redirect_stderr=true
environment=ADMIN_TOKEN="admin123_",PYTHONUNBUFFERED="1"
